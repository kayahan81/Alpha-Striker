<!DOCTYPE html>
<html lang="ru">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon">
      <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
      <title>Alpha Striker | Сайт по подбору соперников </title>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <link rel="stylesheet" href="../css/alphastriker.css">
      <script type="module" src="../js/authorization.js"></script>
  </head>
  <body>
    <header class="top-panel">
      <div class="panel-middle">
        <h1>Российская Лига Альфа Удара</h1>
      </div>
      <div>
        <div id="loginForm">
          <div class="default-flex" style="gap: 5px;">
            <input class="item" type="text" id="login" placeholder="Логин">
            <input class="item" type="password" id="password" placeholder="Пароль">
            <button class="item" id="loginButton">Войти</button>
          </div>
        </div>
        <div id="userGreeting" style="display: none;">
          <div class="default-flex" style="gap: 5px;">
            <img class="avatar item" src="../assets/avatarplaceholder.jpg" alt="Avatar" width="90" height="auto">
            <span class="item">Привет, <span style="font-weight: 700;" id="username"></span>!</span>
            <button class="item" id="logoutButton">Выйти</button>
          </div>
        </div>
      </div>
    </header>
    <main>
      <p>Сайт нужен для поиска оппонентов для игры в Battletech: Alpha Strike. Ниже ссылки на наши ресурсы и инструкцию к сайту</p>
    </main>
    <footer>
      Подвал сайта
    </footer>
  </body>
</html>
