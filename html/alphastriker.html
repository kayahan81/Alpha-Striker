<!DOCTYPE html>
<html lang="ru">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <body class="bg-img" style="--bg-url: url(../assets/fent3.jpg)">
